<div class="p-8 h-[calc(100vh-80px)] flex flex-col">
  <div class="flex gap-5 items-start flex-1 justify-center w-full">
    <app-evaluation-bar></app-evaluation-bar>
    <div id="myBoard" class="shrink-0" style="width: min(70vh, 700px); height: min(70vh, 700px);"></div>

    <div class="w-[380px] shrink-0 h-[min(70vh,700px)] flex flex-col gap-5 bg-wood/75 backdrop-blur-xl p-6 rounded-lg shadow-md">
      <app-evaluation></app-evaluation>
      <app-opening></app-opening>
      <app-move-history class="flex-1 min-h-0"></app-move-history>
      <div class="flex gap-2.5 justify-center">
        <button (click)="openGameManager()"
                class="flex items-center gap-2 px-6 py-3 rounded-md text-base font-medium text-white bg-go hover:bg-go-dark transition-colors cursor-pointer">
          <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m16 6 4 14" /><path d="M12 6v14" /><path d="M8 8v12" /><path d="M4 4v16" />
          </svg>
          Load / Save
        </button>
        <button (click)="resetBoard()"
                class="flex items-center gap-2 px-6 py-3 rounded-md text-base font-medium text-board-light bg-ink hover:bg-ink/80 transition-colors cursor-pointer">
          <svg viewBox="0 0 24 24" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" />
          </svg>
          Reset
        </button>
      </div>
    </div>
  </div>
</div>

<app-game-manager (gameLoaded)="onGameLoaded()"></app-game-manager>
