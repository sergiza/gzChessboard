<div class="w-[25px] h-[min(70vh,700px)] shrink-0 flex flex-col rounded border-2 border-ink overflow-hidden">
  <div class="bg-gradient-to-t from-ink to-wood-dark transition-[height] duration-300"
       [style.height.%]="100 - whitePercentage()"></div>
  <div class="bg-gradient-to-b from-paper to-board-light transition-[height] duration-300"
       [style.height.%]="whitePercentage()"></div>
</div>
